<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PetCare</title>
    <link rel="stylesheet" href="hola.css">
</head>
<body>

    <header>
        <h1>🐾 PetCare</h1>
    </header>

    <section class="hero">
        <h2>Cuida a tu mejor amigo</h2>
        <p>Encuentra todo para tu mascota en un solo lugar</p>
    </section>

    <section class="pets">
        <h2>Nuestras Mascotas</h2>
        <div class="cards">

            <div class="card">
                <img src="/public/img/perro.webp" alt="Perro">
                <h3>Perros</h3>
                <p>Amigos fieles y juguetones.</p>
            </div>

            <div class="card">
                <img src="/public/img/gato.webp" alt="Gato">
                <h3>Gatos</h3>
                <p>Elegantes y cariñosos.</p>
            </div>

            <div class="card">
                <img src="/public/img/loro-rojo-y-verde.webp" alt="Ave">
                <h3>Aves</h3>
                <p>Coloridas y alegres.</p>
            </div>

        </div>
    </section>

    <footer>
        <p>© 2026 PetCare - Todos los derechos reservados</p>
    </footer>

</body>
</html>
